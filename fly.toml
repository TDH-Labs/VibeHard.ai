# VibeHard platform web server (backlog #deploy2). App name is a proposed placeholder — rename
# before the first `fly deploy` if you want something else; Fly app names are globally unique,
# so this one may already be taken. This file is config only — writing it does not deploy or
# create anything; that's a separate, explicit `fly launch` / `fly deploy` step.
app = "vibehard-platform"
primary_region = "iad"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # Builds run as in-process subprocesses on these machines (EPIC #32's full sandbox isolation is
  # the eventual fix). Autostop killed an in-flight build TWICE on 2026-07-04: first outright at
  # min=0, then again at min=1 — min_machines_running guarantees a COUNT, not WHICH machine stays
  # up, and Fly picked the one running the build to stop for "excess capacity" (a decision based
  # on HTTP traffic, blind to a live background subprocess). Disable autostop entirely — every
  # machine stays up — until builds run fully off-box and machine lifecycle stops mattering.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  # SINGLE machine, deliberately (2026-07-09): tenant workspaces (~/.vibehard/tenants) live on
  # this machine's local disk via the volume below. A volume attaches to exactly one machine, so
  # running >1 replicas without shared/object storage means requests round-robin across machines
  # with DIFFERENT copies of the same workspace — confirmed live (one machine held a build's full
  # source tree, the other held a different partial one for the same app). Do not raise this count
  # without first moving workspace storage off local disk (object storage / DB-backed — see
  # docs/ROADMAP.md "Tenant workspace storage isn't durable or machine-consistent").

[[mounts]]
  # Durable tenant workspace storage (2026-07-09, same-day fix for a real data-loss incident: a
  # deploy wiped an in-progress dogfooding build because ~/.vibehard/tenants lived on ephemeral
  # machine disk with nothing mounted). This volume survives deploys/restarts; single machine
  # above means single-attach is exactly what's needed, not a limitation.
  source = "vibehard_data"
  destination = "/root/.vibehard"

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  timeout = "5s"
  path = "/app"

[[vm]]
  # 256MB starved codegen (attempts 4-5); 1GB STILL OOM-killed mid-gate-run on attempt 7
  # ("Out of memory: Killed process ... anon-rss:796836kB" — Next.js typecheck+build alongside
  # the web server + embedded Postgres has no headroom at 1GB). Builds run in-process until
  # EPIC #32 moves them fully off-box — give the machine real headroom.
  memory = "2gb"
