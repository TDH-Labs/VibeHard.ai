# VibeHard platform web server (backlog #deploy2). App name is a proposed placeholder — rename
# before the first `fly deploy` if you want something else; Fly app names are globally unique,
# so this one may already be taken. This file is config only — writing it does not deploy or
# create anything; that's a separate, explicit `fly launch` / `fly deploy` step.
app = "vibehard-platform"
primary_region = "iad"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # Builds run as in-process subprocesses on these machines (EPIC #32's full sandbox isolation is
  # the eventual fix). Autostop killed an in-flight build TWICE on 2026-07-04: first outright at
  # min=0, then again at min=1 — min_machines_running guarantees a COUNT, not WHICH machine stays
  # up, and Fly picked the one running the build to stop for "excess capacity" (a decision based
  # on HTTP traffic, blind to a live background subprocess). Disable autostop entirely — every
  # machine stays up — until builds run fully off-box and machine lifecycle stops mattering.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 2

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  timeout = "5s"
  path = "/app"

[[vm]]
  # 256MB starved the box during codegen: health checks failed and the build subprocess died
  # right as the gates spun up (observed 2026-07-04, attempts 4-5). Builds run in-process until
  # EPIC #32 moves them fully off-box — give the machine real headroom.
  memory = "1gb"
