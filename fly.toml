# VibeHard platform web server (backlog #deploy2). App name is a proposed placeholder — rename
# before the first `fly deploy` if you want something else; Fly app names are globally unique,
# so this one may already be taken. This file is config only — writing it does not deploy or
# create anything; that's a separate, explicit `fly launch` / `fly deploy` step.
app = "vibehard-platform"
primary_region = "iad"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # Builds run as in-process subprocesses on these machines (EPIC #32's full sandbox isolation is
  # the eventual fix). Scale-to-zero KILLED a build mid-codegen on 2026-07-04: the SSE stream
  # dropped, traffic hit zero, Fly stopped the machine, the subprocess died, and the boot sweep
  # paused the orphan. Keep one machine always running until builds are fully off-box.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  timeout = "5s"
  path = "/app"
